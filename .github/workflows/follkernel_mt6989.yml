name: FollKernel MT6989 天玑9400e构建

env:
  TZ: Asia/Shanghai
  KERNEL_BRANCH: oneplus/mt6989_v_15.0.2_ace5_race
  KERNEL_SRC_REPO: https://github.com/cctv18/android_kernel_oneplus_mt6989

on:
  workflow_dispatch:
    inputs:
      susfs_enable:
        description: '是否开启 SUSFS (默认开)'
        required: true
        type: boolean
        default: 'true'
      kpm_enable:
        description: '是否开启 KPM (KpatchNext)'
        required: true
        type: boolean
        default: 'false'
      lz4_enable:
        description: 'LZ4 1.10.0 + ZSTD 1.5.7 补丁'
        required: true
        type: boolean
        default: 'true'
      kernel_suffix:
        description: '内核后缀 (留空=FollKernel)'
        required: false
        type: string
        default: 'FollKernel'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: 初始化环境 + 拉取源码
        run: |
          rm -rf kernel_workspace
          mkdir kernel_workspace
          cd kernel_workspace

          sudo apt-mark hold firefox
          sudo apt-mark hold libc-bin
          sudo apt purge man-db
          sudo rm -rf /var/lib/man-db/auto-update
          sudo apt update
          sudo apt-get install -y --no-install-recommends binutils python-is-python3 libssl-dev libelf-dev &

          wget https://github.com/cctv18/oppo_oplus_realme_sm8650/raw/refs/heads/main/lib/ccache-x86-64 -O ccache
          sudo cp -f ./ccache /usr/bin/ccache
          sudo chmod +x /usr/bin/ccache
          rm -f ./ccache &

          echo ">>> 克隆 MT6989 天玑9400e 内核源码..."
          aria2c -s16 -x16 -k1M "${{ env.KERNEL_SRC_REPO }}/archive/refs/heads/${{ env.KERNEL_BRANCH }}.zip" -o common.zip
          unzip -q common.zip
          mv android_kernel_oneplus_mt6989-* common
          rm common.zip &

          echo ">>> 安装 Clang-20 工具链..."
          mkdir -p clang20
          aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang20-r547379/clang-r547379.zip -o clang.zip
          unzip -q clang.zip -d clang20
          rm clang.zip &

          aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang20-r547379/build-tools.zip -o build-tools.zip
          unzip -q build-tools.zip
          rm build-tools.zip &

          wait
          echo ">>> 所有源码及工具链就绪！"

          rm common/android/abi_gki_protected_exports_* || true
          for f in common/scripts/setlocalversion; do
            sed -i 's/ -dirty//g' "$f"
            sed -i '$i res=$(echo "$res" | sed '"'"'s/-dirty//g'"'"')' "$f"
          done

      - name: 集成 FollKernel
        run: |
          cd kernel_workspace/common
          echo ">>> 集成 FollKernel (Spring-bulid/Rekernel)..."
          rm -rf KernelSU drivers/kernelsu
          git clone --depth=1 https://github.com/Spring-bulid/Rekernel.git KernelSU
          ln -sf "$(realpath KernelSU/kernel)" drivers/kernelsu
          echo "CONFIG_KSU=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_MANAGER_PACKAGE=com.mikokernel" >> arch/arm64/configs/gki_defconfig

      - name: 应用 SUSFS 补丁
        if: inputs.susfs_enable
        run: |
          cd kernel_workspace
          echo ">>> 应用 SUSFS 补丁..."
          git clone --depth=1 https://github.com/cctv18/susfs4oki.git susfs4ksu -b oki-android14-6.1
          cp susfs4ksu/kernel_patches/50_add_susfs_in_gki-android14-6.1.patch common/
          cp susfs4ksu/kernel_patches/fs/* common/fs/ 2>/dev/null || true
          cp susfs4ksu/kernel_patches/include/linux/* common/include/linux/ 2>/dev/null || true
          cd common
          patch -p1 < 50_add_susfs_in_gki-android14-6.1.patch || true
          cd ..
          cat >> common/arch/arm64/configs/gki_defconfig <<'X'
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_TRY_UMOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
          CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          CONFIG_KSU_SUSFS_SUS_MAP=y
          X

      - name: LZ4 + ZSTD 补丁
        if: inputs.lz4_enable
        run: |
          cd kernel_workspace
          git clone --depth=1 https://github.com/cctv18/oppo_oplus_realme_sm8650.git ref -b main
          cp ref/zram_patch/001-lz4.patch common/
          cp ref/zram_patch/lz4armv8.S common/lib/
          cp ref/zram_patch/002-zstd.patch common/
          cd common
          git apply -p1 < 001-lz4.patch || true
          patch -p1 < 002-zstd.patch || true
          rm -rf ../ref

      - name: 通用配置
        run: |
          cd kernel_workspace
          cat >> common/arch/arm64/configs/gki_defconfig <<'X'
          CONFIG_TMPFS_XATTR=y
          CONFIG_TMPFS_POSIX_ACL=y
          CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE=y
          CONFIG_HEADERS_INSTALL=n
          X
          sed -i 's/check_defconfig//' common/build.config.gki

      - name: 内核后缀
        run: |
          cd kernel_workspace
          if [[ -n "${{ github.event.inputs.kernel_suffix }}" ]]; then
            for f in common/scripts/setlocalversion; do
              sed -i "\$s|echo \"\\\$res\"|echo \"-${{ github.event.inputs.kernel_suffix }}\"|" "$f"
            done
          fi

      - name: 编译内核
        run: |
          WORKDIR="$(pwd)"
          export PATH="$WORKDIR/kernel_workspace/clang20/bin:$WORKDIR/kernel_workspace/build-tools/bin:$PATH"
          export CCACHE_COMPILERCHECK=none
          export CCACHE_BASEDIR="$WORKDIR"
          export CCACHE_NOHASHDIR=true
          export CCACHE_DIR="/tmp/.ccache"
          mkdir -p "$CCACHE_DIR"

          cd kernel_workspace/common
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL &

          make -j$(nproc) \
            LLVM=1 \
            ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC="ccache clang" \
            LD=ld.lld \
            HOSTLD=ld.lld \
            O=out \
            KSU_MANAGER_PACKAGE="com.mikokernel" \
            KCFLAGS+=-O2 \
            KCFLAGS+=-Wno-error \
            gki_defconfig all

          echo ">>> 编译完成！"
          ls -lh out/arch/arm64/boot/Image

      - name: KPM 补丁
        if: inputs.kpm_enable
        run: |
          cd kernel_workspace/common/out/arch/arm64/boot
          wget -q https://github.com/KernelSU-Next/KPatch-Next/releases/latest/download/kptools-linux
          wget -q https://github.com/KernelSU-Next/KPatch-Next/releases/latest/download/kpimg-linux
          chmod +x kptools-linux
          ./kptools-linux -p -i Image -k kpimg-linux -o oImage
          rm -f Image; mv oImage Image

      - name: 打包 AnyKernel3
        run: |
          cd kernel_workspace
          git clone https://github.com/cctv18/AnyKernel3 --depth=1
          rm -rf ./AnyKernel3/.git
          cp common/out/arch/arm64/boot/Image AnyKernel3/

          SUFFIX="${{ github.event.inputs.kernel_suffix }}"
          if [[ -z "$SUFFIX" ]]; then SUFFIX="FollKernel"; fi
          ZIP="FollKernel_MT6989_9400e_6.1.115_${{ github.run_number }}.zip"

          cd AnyKernel3
          zip -r "../$ZIP" ./*
          echo "ZIP=$ZIP" >> $GITHUB_ENV

      - name: 上传工件
        uses: actions/upload-artifact@v4
        with:
          name: FollKernel-MT6989-天玑9400e
          path: kernel_workspace/FollKernel_MT6989*.zip
