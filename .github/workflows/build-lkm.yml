name: "Build LKM (7 KMI)"

"on":
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'KernelSU/kernel/**'
      - 'KernelSU/manager/app/src/main/assets/lkm/**'
      - '.github/workflows/build-lkm.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        kmi:
          - android12-5.10
          - android13-5.10
          - android13-5.15
          - android14-5.15
          - android14-6.1
          - android15-6.6
          - android16-6.12
    container:
      image: "ghcr.io/ylarod/ddk-min:${{ matrix.kmi }}-20260313"
      options: --privileged
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fix uapi symlink
        run: |
          if [ ! -d KernelSU/kernel/include/uapi ]; then
            rm -f KernelSU/kernel/include/uapi
            ln -s ../../uapi KernelSU/kernel/include/uapi
          fi

      - name: Build follkernel.ko
        run: |
          cd KernelSU/kernel
          KSU_EXPECTED_SIZE=0x2d4 \
          KSU_EXPECTED_HASH=a23fe337cb870393959384b66050ae8e9d717701cf681ef21f741afa5469919f \
          CONFIG_KSU=m CC=clang make -j$(nproc)
          llvm-strip -d follkernel.ko
          mkdir -p ../out
          cp follkernel.ko "../out/${{ matrix.kmi }}_follkernel.ko"
          echo "Built for ${{ matrix.kmi }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.kmi }}-lkm"
          path: KernelSU/out/${{ matrix.kmi }}_follkernel.ko
