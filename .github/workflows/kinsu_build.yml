name: Build KinSU for OPPO SM8650

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Environment and Kernel Source
        run: |
          set -e
          echo "=== KinSU SM8650 6.1.118 Build ==="
          
          sudo apt-mark hold firefox 2>/dev/null || true
          sudo apt-mark hold libc-bin 2>/dev/null || true
          sudo apt purge man-db 2>/dev/null || true
          sudo rm -rf /var/lib/man-db/auto-update
          sudo apt update -qq
          sudo apt-get install -y --no-install-recommends \
            binutils python-is-python3 libssl-dev libelf-dev \
            aria2 zip unzip curl git ccache \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf \
            flex bison bc make

          echo ">>> Downloading OPPO SM8650 6.1.118 kernel source..."
          aria2c -q -s16 -x16 -k1M \
            https://github.com/cctv18/android_kernel_common_oneplus_sm8650/archive/refs/heads/oneplus/sm8650_b_16.0.0_oneplus12.zip \
            -o common.zip
          unzip -q common.zip
          mv android_kernel_common_oneplus_sm8650-oneplus-sm8650_b_16.0.0_oneplus12 common
          rm common.zip

          mkdir -p clang20
          aria2c -q -s16 -x16 -k1M \
            https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang20-r547379/clang-r547379.zip \
            -o clang.zip
          unzip -q clang.zip -d clang20 && rm clang.zip

          aria2c -q -s16 -x16 -k1M \
            https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang20-r547379/build-tools.zip \
            -o bt.zip
          unzip -q bt.zip && rm bt.zip

          rm -f common/android/abi_gki_protected_exports_*
          for f in common/scripts/setlocalversion; do
            sed -i 's/ -dirty//g' "${f}"
            sed -i "\$s|echo \"\\\$res\"|echo \"-KinSU-6.1.118\"|" "${f}"
          done
          
          echo ">>> Environment ready"
          echo "Clang: $(clang20/bin/clang --version 2>&1 | head -1 || echo 'NOT FOUND')"
          echo "GCC: $(aarch64-linux-gnu-gcc --version 2>&1 | head -1 || echo 'NOT FOUND')"

      - name: Integrate KinSU
        run: |
          wget -q https://raw.githubusercontent.com/Spring-bulid/KinSU/master/kernel/setup.sh -O setup_ksu.sh
          chmod +x setup_ksu.sh
          cd common && bash ../setup_ksu.sh && cd ..

      - name: Apply SuSFS and LZ4 Patches
        run: |
          git clone -q --depth=1 https://github.com/cctv18/susfs4oki.git susfs4ksu -b oki-android14-6.1
          cp susfs4ksu/kernel_patches/50_add_susfs_in_gki-android14-6.1.patch common/
          for d in common/fs common/include/linux; do
            cp susfs4ksu/kernel_patches/${d#common/}/* common/${d#common/}/ 2>/dev/null || true
          done
          cd common && patch -p1 -F 3 < 50_add_susfs_in_gki-android14-6.1.patch || true && cd ..

          git clone -q --depth=1 https://github.com/cctv18/oppo_oplus_realme_sm8650.git oppo_ref
          cp oppo_ref/zram_patch/001-lz4.patch common/
          cp oppo_ref/zram_patch/lz4armv8.S common/lib/
          cp oppo_ref/zram_patch/002-zstd.patch common/
          cd common && git apply -p1 < 001-lz4.patch || true
          patch -p1 < 002-zstd.patch || true
          cd .. && rm -rf oppo_ref

      - name: Configure and Build Kernel
        run: |
          set -e
          DEF="common/arch/arm64/configs/gki_defconfig"
          
          for cfg in \
            CONFIG_KSU=y CONFIG_KPROBES=y CONFIG_HAVE_KPROBES=y \
            CONFIG_KALLSYMS=y CONFIG_KALLSYMS_ALL=y \
            CONFIG_TMPFS_XATTR=y CONFIG_TMPFS_POSIX_ACL=y \
            CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE=y CONFIG_HEADERS_INSTALL=n \
            CONFIG_KSU_SUSFS=y CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y \
            CONFIG_KSU_SUSFS_SUS_PATH=y CONFIG_KSU_SUSFS_SUS_MOUNT=y \
            CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y \
            CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y \
            CONFIG_KSU_SUSFS_SUS_KSTAT=y CONFIG_KSU_SUSFS_TRY_UMOUNT=y \
            CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y \
            CONFIG_KSU_SUSFS_SPOOF_UNAME=y CONFIG_KSU_SUSFS_ENABLE_LOG=y \
            CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y \
            CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y \
            CONFIG_KSU_SUSFS_OPEN_REDIRECT=y CONFIG_KSU_SUSFS_SUS_MAP=y \
            CONFIG_MQ_IOSCHED_SSG=y CONFIG_MQ_IOSCHED_SSG_CGROUP=y \
            CONFIG_BBG=y; do
            echo "${cfg}" >> "${DEF}"
          done
          
          cd common
          curl -sSL https://github.com/cctv18/Baseband-guard/raw/master/setup.sh | bash
          sed -i '/^config LSM$/,/^help$/{/^[[:space:]]*default/{/baseband_guard/!s/selinux/selinux,baseband_guard/}}' security/Kconfig
          cd ..
          sed -i 's/check_defconfig//' common/build.config.gki
          
          export PATH="${GITHUB_WORKSPACE}/clang20/bin:${GITHUB_WORKSPACE}/build-tools/bin:${PATH}"
          
          echo ">>> Generating defconfig..."
          cd common
          echo "core_ctl" >> drivers/soc/qcom/.gitignore 2>/dev/null || true
          
          make -j$(nproc) \
            LLVM=1 \
            ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabihf- \
            CC=clang LD=ld.lld \
            O=out \
            gki_defconfig 2>&1 | tail -5
          
          echo ">>> Building kernel... (this may take 20-30 minutes)"
          make -j$(nproc) \
            LLVM=1 \
            ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabihf- \
            CC=clang LD=ld.lld \
            O=out \
            KCFLAGS="-O2 -Wno-error" \
            all 2>&1 | tail -20
          
          echo "=== BUILD SUCCESS ==="
          ls -lh out/arch/arm64/boot/Image

      - name: Package AnyKernel3
        run: |
          git clone -q https://github.com/cctv18/AnyKernel3 --depth=1
          rm -rf AnyKernel3/.git
          cp common/out/arch/arm64/boot/Image AnyKernel3/
          ZIP="KinSU-SM8650-6.1.118-susfs-$(date +%Y%m%d%H%M).zip"
          cd AnyKernel3 && zip -qr "../${ZIP}" ./*
          echo "ZIP=${ZIP}" >> "${GITHUB_ENV}"

      - name: Upload Kernel
        uses: actions/upload-artifact@v4
        with:
          name: KinSU-SM8650
          path: KinSU-SM8650-*.zip
