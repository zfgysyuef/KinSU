name: "Full Build"

"on":
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'KernelSU/**'
      - '.github/workflows/build.yml'

jobs:
  gen-key:
    runs-on: ubuntu-latest
    outputs:
      expected_size: ${{ steps.extract.outputs.expected_size }}
      expected_hash: ${{ steps.extract.outputs.expected_hash }}
      keystore: ${{ steps.gen.outputs.keystore }}
      keystore_password: ${{ steps.gen.outputs.keystore_password }}
      key_password: ${{ steps.gen.outputs.key_password }}
    steps:
      - name: Generate keystore
        id: gen
        run: |
          KP=$(openssl rand -hex 32)
          AP=$(openssl rand -hex 32)
          echo "keystore_password=$KP" >> $GITHUB_OUTPUT
          echo "key_password=$AP" >> $GITHUB_OUTPUT
          keytool -genkeypair -alias follkernel -keyalg RSA -keysize 2048 -validity 10000 -storepass "$KP" -keypass "$AP" -dname "CN=KinSU" -storetype JKS -keystore follkernel.jks
          echo "keystore=$(base64 -w0 follkernel.jks)" >> $GITHUB_OUTPUT
      - name: Extract cert
        id: extract
        env:
          SP: ${{ steps.gen.outputs.keystore_password }}
        run: |
          keytool -exportcert -alias follkernel -keystore follkernel.jks -storepass "$SP" -file cert.der
          SZ=$(stat -c%s cert.der)
          echo "expected_size=0x$(printf '%04x' $SZ)" >> $GITHUB_OUTPUT
          H=$(sha256sum cert.der | awk '{print $1}')
          echo "expected_hash=$H" >> $GITHUB_OUTPUT

  build-lkm:
    needs: gen-key
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        kmi:
          - android12-5.10
          - android13-5.10
          - android13-5.15
          - android14-5.15
          - android14-6.1
          - android15-6.6
          - android16-6.12
    container:
      image: "ghcr.io/ylarod/ddk-min:${{ matrix.kmi }}-20260313"
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      - name: Fix uapi
        run: |
          if [ ! -d KernelSU/kernel/include/uapi ]; then
            rm -f KernelSU/kernel/include/uapi
            ln -s ../../uapi KernelSU/kernel/include/uapi
          fi
      - name: Build
        env:
          ES: ${{ needs.gen-key.outputs.expected_size }}
          EH: ${{ needs.gen-key.outputs.expected_hash }}
        run: |
          cd KernelSU/kernel
          KSU_EXPECTED_SIZE="$ES" KSU_EXPECTED_HASH="$EH" CONFIG_KSU=m CC=clang make -j$(nproc)
          llvm-strip -d follkernel.ko
          mkdir -p ../out
          cp follkernel.ko "../out/${{ matrix.kmi }}_follkernel.ko"
      - uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.kmi }}-lkm"
          path: KernelSU/out/${{ matrix.kmi }}_follkernel.ko

  build-ksud:
    needs: [gen-key, build-lkm]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - aarch64-linux-android
          - x86_64-linux-android
    steps:
      - uses: actions/checkout@v4

      - name: Download LKMs
        uses: actions/download-artifact@v4
        with:
          pattern: '*-lkm'
          path: ${{ github.workspace }}/lkm-artifacts

      - name: Place LKMs for ksud
        run: |
          case "${{ matrix.target }}" in
            aarch64*) dir="KernelSU/userspace/ksud/bin/aarch64" ;;
            x86_64*) dir="KernelSU/userspace/ksud/bin/x86_64" ;;
          esac
          mkdir -p "$dir"
          find "${{ github.workspace }}/lkm-artifacts" -name "*_follkernel.ko" | while read ko; do
            kmi=$(basename "$(dirname "$ko")" -lkm)
            cp "$ko" "$dir/${kmi}_follkernel.ko"
            echo "Placed ${kmi}_follkernel.ko in $dir"
          done

      - name: Setup Rust
        run: |
          rustup update stable
          rustup target add ${{ matrix.target }}

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r29

      - name: Build ksud
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          source KernelSU/.github/scripts/setup-rust-build.sh ${{ matrix.target }} 26
          cargo build --target ${{ matrix.target }} --release --manifest-path KernelSU/userspace/ksud/Cargo.toml

      - uses: actions/upload-artifact@v4
        with:
          name: "ksud-${{ matrix.target }}"
          path: KernelSU/target/${{ matrix.target }}/release/ksud

  build-apk:
    needs: [gen-key, build-lkm, build-ksud]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: KernelSU/manager
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download LKMs
        uses: actions/download-artifact@v4
        with:
          pattern: '*-lkm'
          path: ${{ github.workspace }}/lkm-artifacts

      - name: Download ksud
        uses: actions/download-artifact@v4
        with:
          pattern: 'ksud-*'

      - name: Place LKMs (assets)
        run: |
          mkdir -p app/src/main/assets/lkm
          find "${{ github.workspace }}/lkm-artifacts" -name "*_follkernel.ko" | while read ko; do
            kmi=$(basename "$(dirname "$ko")" -lkm)
            cp "$ko" "app/src/main/assets/lkm/${kmi}_rekernel.ko"
            echo "Placed ${kmi}_rekernel.ko"
          done

      - name: Place ksud (jniLibs)
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a app/src/main/jniLibs/x86_64
          AARCH64=$(find "${{ github.workspace }}/ksud-aarch64-linux-android" -name ksud -type f | head -1)
          X86_64=$(find "${{ github.workspace }}/ksud-x86_64-linux-android" -name ksud -type f | head -1)
          test -n "$AARCH64" && cp "$AARCH64" app/src/main/jniLibs/arm64-v8a/libfollkerneld.so && echo "Placed arm64 ksud"
          test -n "$X86_64" && cp "$X86_64" app/src/main/jniLibs/x86_64/libfollkerneld.so && echo "Placed x86_64 ksud"

      - name: Setup keystore
        env:
          KS: ${{ needs.gen-key.outputs.keystore }}
          KP: ${{ needs.gen-key.outputs.keystore_password }}
          AP: ${{ needs.gen-key.outputs.key_password }}
        run: |
          echo "$KS" | base64 -d > follkernel.jks
          echo "KEYSTORE_PASSWORD=$KP" >> gradle.properties
          echo "KEY_ALIAS=follkernel" >> gradle.properties
          echo "KEY_PASSWORD=$AP" >> gradle.properties
          echo "KEYSTORE_FILE=$(realpath follkernel.jks)" >> gradle.properties

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - uses: android-actions/setup-android@v3

      - name: Build
        run: ./gradlew assembleRelease

      - uses: actions/upload-artifact@v4
        with:
          name: apk-final
          path: KernelSU/manager/app/build/outputs/apk/release/*.apk
