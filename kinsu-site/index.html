body{font-family:'Noto Sans SC','Inter',system-ui,-apple-system,sans-serif;color:var(--text-primary);background:var(--bg);line-height:1.6;overflow-x:hidden}

.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(91,124,255,.45);color:#fff}

.comparison{padding:100px 24px;max-width:960px;margin:0 auto;position:relative}

.footer{padding:40px 24px;text-align:center;border-top:1px solid var(--border-light);color:var(--text-tertiary);font-size:14px;background:#fff}

#docs{display:none;padding-top:var(--navbar-h);height:100vh}

.docs-main{flex:1;overflow-y:auto;position:relative;background:#fafbff}

.breadcrumb{font-size:13px;color:var(--text-tertiary);margin-bottom:24px;display:flex;align-items:center;gap:6px}

.doc-body h2{font-size:24px;font-weight:600;color:#1a1f36;margin-top:30px;margin-bottom:12px}

.doc-body pre code{background:none;padding:0;color:inherit;font-size:inherit}
.doc-body blockquote{border-left:3px solid var(--primary);background:#f2f4f7;padding:12px 16px;margin:12px 0;border-radius:0 var(--radius-sm) var(--radius-sm) 0;color:var(--text-secondary);font-size:14px}
.doc-body table{width:100%;border-collapse:collapse;margin:12px 0 16px;font-size:14px}
.doc-body th{background:var(--bg-gray);padding:10px 14px;text-align:left;font-weight:600;border:1px solid var(--border)}
.doc-body td{padding:10px 14px;border:1px solid var(--border)}
.doc-body tr:nth-child(even) td{background:#fafbfc}

.callout{padding:12px 16px;border-radius:var(--radius-md);margin:12px 0 16px;font-size:14px;line-height:1.6;display:flex;gap:10px;align-items:flex-start}
.callout-icon{font-size:16px;font-weight:700;flex-shrink:0;margin-top:1px;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.callout-info{background:#f0f4ff;border:1px solid #c8d4ff;color:#4259d8}
.callout-warning{background:#fff8f0;border:1px solid #ffd9b3;color:#a65c00}

.docs-toc{width:var(--toc-w);min-width:var(--toc-w);padding:32px 16px;overflow-y:auto;border-left:1px solid var(--border-light);background:#fff}

@media(max-width:1024px){.docs-toc{display:none}}

@keyframes slide-in-left{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:translateX(0)}}
@keyframes slide-in-right{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}

.feature-card{opacity:0;animation:scale-in .5s ease forwards}
.feature-card:nth-child(1){animation-delay:.1s}
.feature-card:nth-child(2){animation-delay:.2s}
.feature-card:nth-child(3){animation-delay:.3s}
.feature-card:nth-child(4){animation-delay:.4s}
.feature-card:nth-child(5){animation-delay:.5s}
.feature-card:nth-child(6){animation-delay:.6s}
.step{opacity:0;animation:slide-in-left .5s ease forwards}
.step:nth-child(1){animation-delay:.1s}
.step:nth-child(2){animation-delay:.2s}
.step:nth-child(3){animation-delay:.3s}
.step:nth-child(4){animation-delay:.4s}
@keyframes gradient-shift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.getting-started{background:linear-gradient(135deg,#f0f3fa,#f8faff,#eef1ff,#f0f3fa);background-size:300% 300%;animation:gradient-shift 12s ease infinite}
.contributors{background:linear-gradient(135deg,#f8faff,#f0f3fa,#eef1ff,#f8faff);background-size:300% 300%;animation:gradient-shift 12s ease infinite}
.section-underline{width:60px;height:3px;background:linear-gradient(90deg,var(--primary),var(--primary-dark));border-radius:2px;margin:0 auto 56px}

.features-inner,.getting-started-inner,.comparison-inner,.contributors-inner{position:relative;z-index:1}
.hero-bg{background:linear-gradient(135deg,#1a1d2e,#2d3561,#1a1d2e),url('https://acg.yaohud.cn/dm/adaptive.php') center/cover no-repeat;background-blend-mode:overlay}
</style>

p('\u8def\u5f84\u7a7f\u8d8a\uff08Path Traversal\uff09\u662f\u4e00\u79cd\u5229\u7528 ../ \u7b49\u7279\u6b8a\u5b57\u7b26\u8df3\u51fa\u9650\u5236\u76ee\u5f55\u7684\u653b\u51fb\u65b9\u5f0f\u3002\u5728 Root \u5de5\u5177\u4e2d\uff0c\u8fd9\u79cd\u6f0f\u6d1e\u53ef\u80fd\u5bfc\u81f4\u653b\u51fb\u8005\u8bbf\u95ee\u6216\u4fee\u6539\u7cfb\u7edf\u4e2d\u7684\u4efb\u610f\u6587\u4ef6\u3002')+
h2('KinSU \u7684\u9632\u62a4\u63aa\u65bd')+
h3('1. \u8def\u5f84\u89c4\u8303\u5316')+
p('\u6240\u6709\u6587\u4ef6\u8def\u5f84\u5728\u4f7f\u7528\u524d\u90fd\u4f1a\u7ecf\u8fc7\u89c4\u8303\u5316\u5904\u7406\uff0c\u6d88\u9664 ../ \u7b49\u7a7f\u8d8a\u5e8f\u5217\uff1a')+
pre('// \u8def\u5f84\u89c4\u8303\u5316\u793a\u4f8b\nstatic char *normalize_path(const char *path) {\n    char *resolved = realpath(path, NULL);\n    if (!resolved) return NULL;\n\n    // \u68c0\u67e5\u662f\u5426\u5728\u5141\u8bb8\u7684\u76ee\u5f55\u5185\n    if (strncmp(resolved, ALLOWED_DIR, strlen(ALLOWED_DIR)) != 0) {\n        free(resolved);\n        return NULL;\n    }\n    return resolved;\n}')+
h3('2. \u6c99\u7bb1\u76ee\u5f55\u9650\u5236')+
p('\u6a21\u5757\u548c\u811a\u672c\u53ea\u80fd\u8bbf\u95ee\u5176\u6307\u5b9a\u7684\u5de5\u4f5c\u76ee\u5f55\uff0c\u65e0\u6cd5\u8bbf\u95ee\u7cfb\u7edf\u7684\u5176\u4ed6\u4f4d\u7f6e\uff1a')+
pre('// \u6c99\u7bb1\u76ee\u5f55\u9650\u5236\nstatic const char *allowed_dirs[] = {\n    "/data/adb/modules/",\n    "/data/adb/kinsu/",\n    NULL\n};\n\nstatic int is_path_allowed(const char *path) {\n    char *resolved = realpath(path, NULL);\n    if (!resolved) return 0;\n    for (int i = 0; allowed_dirs[i]; i++) {\n        if (strncmp(resolved, allowed_dirs[i],\n            strlen(allowed_dirs[i])) == 0) {\n            free(resolved);\n            return 1;\n        }\n    }\n    free(resolved);\n    return 0;\n}')+
h3('3. \u7b26\u53f7\u94fe\u63a5\u68c0\u67e5')+
p('KinSU \u4f1a\u68c0\u67e5\u7b26\u53f7\u94fe\u63a5\u662f\u5426\u6307\u5411\u5141\u8bb8\u8303\u56f4\u5916\u7684\u6587\u4ef6\uff0c\u9632\u6b62\u901a\u8fc7\u7b26\u53f7\u94fe\u63a5\u7ed5\u8fc7\u8def\u5f84\u68c0\u67e5\uff1a')+
pre('// \u7b26\u53f7\u94fe\u63a5\u68c0\u67e5\nstatic int check_symlink(const char *path) {\n    struct stat st;\n    if (lstat(path, &st) != 0) return -1;\n    if (S_ISLNK(st.st_mode)) {\n        char target[PATH_MAX];\n        ssize_t len = readlink(path, target, sizeof(target)-1);\n        if (len < 0) return -1;\n        target[len] = 0;\n        return is_path_allowed(target);\n    }\n    return 0;\n}')+
callout('info','KinSU \u7684\u8def\u5f84\u7a7f\u8d8a\u9632\u62a4\u91c7\u7528\u591a\u5c42\u9632\u5fa1\u7b56\u7565\uff0c\u5305\u62ec\u8def\u5f84\u89c4\u8303\u5316\u3001\u6c99\u7bb1\u9650\u5236\u548c\u7b26\u53f7\u94fe\u63a5\u68c0\u67e5\uff0c\u786e\u4fdd\u6587\u4ef6\u8bbf\u95ee\u7684\u5b89\u5168\u6027\u3002');
}};

D['module-dev']={title:'\u6a21\u5757\u5f00\u53d1',cat:'\u5f00\u53d1\u6307\u5357',updated:'2026-06-24',html:function(){

  ['MODDIR','\u6a21\u5757\u5b89\u88c5\u76ee\u5f55'],
  ['MODPATH','\u6a21\u5757\u5b8c\u6574\u8def\u5f84'],
  ['MODNAME','\u6a21\u5757\u540d\u79f0'],
  ['KSU','\u662f\u5426\u5728 KinSU \u73af\u5883\u4e0b\u8fd0\u884c'],

D['webui-dev']={title:'WebUI \u5f00\u53d1',cat:'\u5f00\u53d1\u6307\u5357',updated:'2026-06-24',html:function(){

// ====== HTML Helper Functions ======
function h2(t){return '<h2 id="'+slug(t)+'">'+t+'</h2>';}
function h3(t){return '<h3 id="'+slug(t)+'">'+t+'</h3>';}
function p(t){return '<p>'+t+'</p>';}
function ul(items){return '<ul>'+items.map(function(i){return '<li>'+i+'</li>';}).join('')+'</ul>';}
function ol(items){return '<ol>'+items.map(function(i){return '<li>'+i+'</li>';}).join('')+'</ol>';}
function pre(code){return '<pre><code>'+esc(code)+'</code></pre>';}
function callout(kind,text){
  var cls=kind==='warning'?'callout-warning':kind==='tip'?'callout-tip':'callout-info';
  var icon=kind==='warning'?'!':kind==='tip'?'i':'i';
  return '<div class="callout '+cls+'"><span class="callout-icon">'+icon+'</span><span>'+text+'</span></div>';
}
function table(headers,rows){
  var h='<table><thead><tr>'+headers.map(function(x){return '<th>'+x+'</th>';}).join('')+'</tr></thead><tbody>';
  rows.forEach(function(r){h+='<tr>'+r.map(function(c){return '<td>'+c+'</td>';}).join('')+'</tr>';});
  return h+'</tbody></table>';
}
function slug(s){return s.replace(/[^\w\u4e00-\u9fff]/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'');}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ====== App State ======
var currentPage='install';
var currentView='home';

// ====== Initialize Landing Page ======
function initLanding(){
  document.getElementById('heroTitle').textContent=T.heroTitle;
  document.getElementById('heroSubtitle').innerHTML=T.heroSubtitle;
  document.getElementById('heroDesc').innerHTML=T.heroDesc;
  document.getElementById('heroButtons').innerHTML=
    '<a href="https://github.com/Spring-bulid/KinSU/releases/latest" target="_blank" class="btn-primary">'+T.btnAdventure+'</a>'+
    '<a href="#" onclick="switchToDocs();return false;" class="btn-secondary">'+T.btnGuide+'</a>';
  document.getElementById('featuresTitle').textContent=T.featuresTitle;
  document.getElementById('featuresDesc').textContent=T.featuresDesc;
  var fg=document.getElementById('featuresGrid');
  fg.innerHTML=features.map(function(f){
    return '<div class="feature-card"><div class="feature-icon">'+f.icon+'</div><div class="feature-name">'+f.name+'</div><div class="feature-desc">'+f.desc+'</div></div>';
  }).join('');
  document.getElementById('gsTitle').textContent=T.gsTitle;
  document.getElementById('gsDesc').textContent=T.gsDesc;
  var sc=document.getElementById('stepsContainer');
  sc.innerHTML=steps.map(function(s){
    return '<div class="step"><div class="step-num">'+s.num+'</div><div class="step-title">'+s.title+'</div><div class="step-desc">'+s.desc+'</div></div>';
  }).join('');
  document.getElementById('compTitle').textContent=T.compTitle;
  document.getElementById('compDesc').textContent=T.compDesc;
  var ct='<table class="comparison-table"><thead><tr><th>\u529f\u80fd</th><th>KinSU</th><th>KernelSU</th><th>Magisk</th></tr></thead><tbody>';
  compRows.forEach(function(r){
    ct+='<tr><td>'+r[0]+'</td>';
    for(var i=1;i<=3;i++){
      if(r[i]===true) ct+='<td class="check">\u662f</td>';
      else if(r[i]===false) ct+='<td class="cross">\u5426</td>';
      else ct+='<td>'+r[i]+'</td>';
    }
    ct+='</tr>';
  });
  ct+='</tbody></table>';
  document.getElementById('comparisonTable').innerHTML=ct;
  document.getElementById('contribTitle').textContent=T.contribTitle;
  document.getElementById('contribDesc').textContent=T.contribDesc;
  var ag=document.getElementById('avatarGrid');
  ag.innerHTML=contribIds.map(function(id){
    return '<img class="avatar" src="https://aka.doubaocdn.com/s/'+id+'" alt="Contributor" loading="lazy">';
  }).join('');
  document.getElementById('footer').innerHTML=T.footer;
}

// ====== Initialize Docs Sidebar ======
function initSidebar(){
  document.getElementById('sidebarTitleText').textContent=T.sidebarTitle;
  var tree=document.getElementById('sidebarTree');
  tree.innerHTML=docTree.map(function(section){
    var expanded=section.children.some(function(c){return c.id===currentPage;});
    return '<div class="sidebar-section'+(expanded?' expanded':'')+'" data-section="'+section.id+'">'+
      '<div class="sidebar-section-header" onclick="toggleSection(\''+section.id+'\')">'+
      '<span>'+section.icon+' '+section.title+'</span>'+
      '<span class="sidebar-arrow">\u25b6</span>'+
      '</div>'+
      '<div class="sidebar-items">'+
      section.children.map(function(child){
        return '<div class="sidebar-item'+(child.id===currentPage?' active':'')+'" data-page="'+child.id+'" onclick="navigateTo(\''+child.id+'\')">'+child.title+'</div>';
      }).join('')+
      '</div></div>';
  }).join('');
}

function toggleSection(id){
  var el=document.querySelector('[data-section="'+id+'"]');
  if(el)el.classList.toggle('expanded');
}

// ====== Navigate to Page ======
function navigateTo(pageId){
  currentPage=pageId;
  var doc=D[pageId];
  if(!doc)return;
  // Update sidebar active state
  document.querySelectorAll('.sidebar-item').forEach(function(el){
    el.classList.toggle('active',el.getAttribute('data-page')===pageId);
  });
  // Expand parent section
  document.querySelectorAll('.sidebar-section').forEach(function(sec){
    var sectionId=sec.getAttribute('data-section');
    var section=docTree.find(function(s){return s.id===sectionId;});
    if(section&&section.children.some(function(c){return c.id===pageId;})){
      sec.classList.add('expanded');
    }
  });
  // Render content
  renderDoc(doc);
  // Scroll to top
  document.getElementById('docsMain').scrollTop=0;
  // Close mobile sidebar
  document.getElementById('docsSidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('show');
}

function renderDoc(doc){
  document.getElementById('breadcrumb').innerHTML=
    '<a href="#" onclick="switchToHome();return false;">'+T.navHome+'</a><span class="breadcrumb-sep">/</span>'+
    '<span>'+doc.cat+'</span><span class="breadcrumb-sep">/</span><span>'+doc.title+'</span>';
  document.getElementById('docTitle').textContent=doc.title;
  document.getElementById('docMeta').innerHTML=
    '<span>'+T.updatedLabel+' '+doc.updated+'</span>'+
    '<span>'+T.readingTime+' 5 '+T.minute+'</span>';
  document.getElementById('docBody').innerHTML=doc.html();
  // Build TOC
  buildTOC();
}

function buildTOC(){
  var tocEl=document.getElementById('tocItems');
  var headings=document.querySelectorAll('#docBody h2, #docBody h3');
  var html='';
  headings.forEach(function(h){
    var cls=h.tagName==='H3'?'toc-item h3':'toc-item';
    html+='<div class="'+cls+'" onclick="scrollToHeading(\''+h.id+'\')">'+h.textContent+'</div>';
  });
  tocEl.innerHTML=html;
  document.getElementById('tocTitle').textContent=T.tocLabel;
  // Setup scroll spy
  setupScrollSpy();
}

function scrollToHeading(id){
  var el=document.getElementById(id);
  if(el){
    var main=document.getElementById('docsMain');
    main.scrollTop=el.offsetTop-80;
  }
}

var scrollSpyTimer=null;
function setupScrollSpy(){
  var main=document.getElementById('docsMain');
  main.removeEventListener('scroll',onScrollSpy);
  main.addEventListener('scroll',onScrollSpy);
}

function onScrollSpy(){
  clearTimeout(scrollSpyTimer);
  scrollSpyTimer=setTimeout(function(){
    var headings=document.querySelectorAll('#docBody h2, #docBody h3');
    var main=document.getElementById('docsMain');
    var scrollTop=main.scrollTop+100;
    var activeId=null;
    headings.forEach(function(h){
      if(h.offsetTop<=scrollTop)activeId=h.id;
    });
    document.querySelectorAll('.toc-item').forEach(function(t){
      var text=t.textContent;
      var isActive=false;
      headings.forEach(function(h){
        if(h.id===activeId&&h.textContent===text)isActive=true;
      });
      t.classList.toggle('active',isActive);
    });
  },50);
}

// ====== View Switching ======
function switchToDocs(){
  currentView='docs';
  document.getElementById('landing').style.display='none';
  document.getElementById('docs').style.display='block';
  document.getElementById('tabHome').classList.remove('active');
  document.getElementById('tabDocs').classList.add('active');
  document.getElementById('navbar').classList.add('dark');
  initSidebar();
  navigateTo(currentPage);
}

function switchToHome(){
  currentView='home';
  document.getElementById('landing').style.display='block';
  document.getElementById('docs').style.display='none';
  document.getElementById('tabHome').classList.add('active');
  document.getElementById('tabDocs').classList.remove('active');
  document.getElementById('navbar').classList.remove('dark');
}

// Make switchToDocs global
window.switchToDocs=switchToDocs;
window.switchToHome=switchToHome;
window.toggleSection=toggleSection;
window.navigateTo=navigateTo;
window.scrollToHeading=scrollToHeading;

// ====== Event Listeners ======
document.getElementById('tabHome').addEventListener('click',switchToHome);
document.getElementById('tabDocs').addEventListener('click',switchToDocs);
document.getElementById('navLogo').addEventListener('click',switchToHome);

document.getElementById('tabHome').textContent=T.navHome;
document.getElementById('tabDocs').textContent=T.navDocs;

// Mobile menu
document.getElementById('mobileMenuBtn').addEventListener('click',function(){
  document.getElementById('docsSidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('show');
});
document.getElementById('sidebarOverlay').addEventListener('click',function(){
  document.getElementById('docsSidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('show');
});

// Navbar scroll effect for landing
window.addEventListener('scroll',function(){
  if(currentView==='home'){
    var nb=document.getElementById('navbar');
    if(window.scrollY>100)nb.classList.add('dark');
    else nb.classList.remove('dark');
  }
});

// ====== Initialize ======
initLanding();

})();
</script>
